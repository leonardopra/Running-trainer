name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub Releases and upload APK
  pages: write      # needed to deploy to GitHub Pages
  id-token: write   # needed for Pages OIDC authentication

jobs:
  # ── Web build → GitHub Pages ──────────────────────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Scaffold missing web platform files without touching lib/
      - name: Scaffold web platform
        run: flutter create . --platforms web

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icons (web)
        run: dart run flutter_launcher_icons

      - name: Build web
        # base-href must match the GitHub Pages sub-path (repo name)
        run: flutter build web --release --base-href /Running-trainer/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── APK build → GitHub Releases ───────────────────────────────────────────
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Scaffold missing android platform files without touching lib/
      - name: Scaffold android platform
        run: flutter create . --platforms android

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icons (android)
        run: dart run flutter_launcher_icons

      - name: Generate splash screen (android)
        run: |
          dart pub global activate flutter_native_splash
          cat >> pubspec.yaml << 'EOF'

          flutter_native_splash:
            color: "#0A0A0F"
            image: assets/icon/icon.png
            android: true
            ios: false
            web: false
            android_12:
              image: assets/icon/icon.png
              icon_background_color: "#0A0A0F"
          EOF
          dart run flutter_native_splash:create

      - name: Build APK
        run: flutter build apk --release

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Running Trainer ${{ github.ref_name }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/app-release.apk
