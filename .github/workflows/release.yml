name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

permissions:
  contents: write   # needed to create GitHub Releases and upload APK
  pages: write      # needed to deploy to GitHub Pages
  id-token: write   # needed for Pages OIDC authentication

jobs:
  # ── Web build → GitHub Pages ──────────────────────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Scaffold platform files (android needed for flutter_launcher_icons even in web builds)
      - name: Scaffold platforms
        run: flutter create . --platforms web,android

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Generate app icons (web)
        run: dart run flutter_launcher_icons

      - name: Build web
        # base-href must match the GitHub Pages sub-path (repo name)
        run: flutter build web --release --renderer html --base-href /Running-trainer/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── AAB build → GitHub Releases ───────────────────────────────────────────
  build-aab:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Scaffold missing android platform files without touching lib/
      - name: Scaffold android platform
        run: flutter create . --platforms android

      - name: Install dependencies
        run: flutter pub get

      - name: Patch Android manifest for flutter_local_notifications
        run: python3 tool/patch_android_manifest.py

      - name: Patch build.gradle for core library desugaring
        run: python3 tool/patch_android_build_gradle.py

      # Check if signing secrets are present and expose as step output
      - name: Check signing secrets
        id: secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "has_keystore=true" >> $GITHUB_OUTPUT
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          fi

      # Decode keystore and write key.properties (only when secrets are available)
      - name: Decode keystore
        if: steps.secrets.outputs.has_keystore == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          printf 'storeFile=upload-keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" \
            > android/key.properties

      - name: Patch build.gradle for signing config and SDK 34
        env:
          APP_ID: com.leopra.runningtrainer
        run: python3 tool/patch_android_signing.py

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Generate app icons (android)
        run: dart run flutter_launcher_icons

      - name: Generate splash screen (android)
        run: flutter pub run flutter_native_splash:create

      - name: Build AAB (release)
        if: steps.secrets.outputs.has_keystore == 'true'
        run: flutter build appbundle --release

      - name: Build AAB (debug — no signing secrets available)
        if: steps.secrets.outputs.has_keystore == 'false'
        run: flutter build appbundle --debug

      - name: Attach AAB to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && steps.secrets.outputs.has_keystore == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: Running Trainer ${{ github.ref_name }}
          generate_release_notes: true
          files: build/app/outputs/bundle/release/app-release.aab
