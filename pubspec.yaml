name: running_trainer_app
description: Personalised running training plans with rule-based progression and optional Claude AI coaching. Cross-platform, fully offline, no account required.
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  dio: ^5.4.3
  go_router: ^17.1.0
  uuid: ^4.3.3
  intl: ^0.20.2
  flutter_secure_storage: ^10.0.0
  url_launcher: ^6.2.6
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0

flutter_icons:
  android: true
  ios: false
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#0A0A0F"
    theme_color: "#00E5FF"
  image_path: "assets/icon/icon.png"

flutter_native_splash:
  color: "#0A0A0F"
  image: assets/icon/icon.png
  android: true
  ios: false
  web: false
  android_12:
    image: assets/icon/icon.png
    icon_background_color: "#0A0A0F"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/
