name: running_trainer_app
description: Personalised running training plans with rule-based progression and optional Claude AI coaching. Cross-platform, fully offline, no account required.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  dio: ^5.4.3
  go_router: ^13.2.0
  uuid: ^4.3.3
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
