name: RunningTrainer
options:
  bundleIdPrefix: com.runningtrainer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  defaultConfig: Debug
  useBaseInternationalization: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_BUNDLE_IDENTIFIER: com.runningtrainer.ios
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  RunningTrainer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RunningTrainer
        excludes:
          - "**/*.md"
    resources:
      - RunningTrainer/Resources/Info.plist
    info:
      path: RunningTrainer/Resources/Info.plist
    settings:
      base:
        PRODUCT_NAME: RunningTrainer
        INFOPLIST_FILE: RunningTrainer/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ""

  RunningTrainerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RunningTrainerTests
    dependencies:
      - target: RunningTrainer
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/RunningTrainer.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/RunningTrainer"
        BUNDLE_LOADER: "$(TEST_HOST)"
